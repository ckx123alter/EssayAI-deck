<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>03 · 用户痛点</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
.light-stage { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.light-ambient {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 1600px; height: 700px;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(185,198,212,0.10) 0%, rgba(185,198,212,0.04) 35%, transparent 65%);
  animation: lightReveal 2.4s var(--ease-soft) forwards; opacity: 0;
}

.page-header { margin-bottom: 64px; }

/* ——— Quote Editorial Layout ——— */
.quotes-col {
  display: flex; flex-direction: column; gap: 52px;
  flex: 0; max-width: 1080px; margin: 0 auto;
}

.quote-block {
  display: flex; align-items: flex-start; gap: 40px;
  opacity: 0; animation: cardReveal 1.1s var(--ease-soft) forwards;
}
.quote-block:nth-child(1) { animation-delay: 0.7s; }
.quote-block:nth-child(2) { animation-delay: 1.0s; }
.quote-block:nth-child(3) { animation-delay: 1.3s; }

/* Pain tag */
.quote-tag {
  flex: 0 0 96px;
  font-family: var(--font-serif); font-size: 28px; font-weight: 500;
  letter-spacing: 0.06em; color: #C0392B;
  padding-top: 0;
}
.tag-tai { color: var(--accent); }

/* Hero quote text */
.quote-body { flex: 1; }
.quote-voice {
  font-family: var(--font-serif); font-size: 28px; font-weight: 400; font-style: italic;
  line-height: 1.4; letter-spacing: 0.02em;
  color: var(--text-primary); margin-bottom: 12px;
}
.quote-voice::before { content: '「'; }
.quote-voice::after  { content: '」'; }

.quote-context {
  font-family: var(--font-sans); font-size: 14px; font-weight: 300;
  line-height: 1.7; color: var(--text-secondary);
  max-width: 640px;
}
.quote-context .em { font-weight: 500; color: var(--text-primary); }

/* Subdued rule between blocks */
.quote-block + .quote-block {
  border-top: 1px solid rgba(0,0,0,0.06); padding-top: 52px;
}

/* Diffused ambient light pools */
.deco-sphere { position: fixed; border-radius: 50%; pointer-events: none; z-index: 998; filter: blur(80px); }
.deco-bl {
  bottom: -300px; left: -200px; width: 900px; height: 700px;
  background: radial-gradient(ellipse 60% 55% at 45% 40%, rgba(200,190,175,0.18) 0%, rgba(195,185,170,0.06) 35%, transparent 65%);
}
.deco-tr {
  top: -250px; right: -150px; width: 800px; height: 600px;
  background: radial-gradient(ellipse 55% 50% at 55% 50%, rgba(175,190,210,0.15) 0%, rgba(180,195,215,0.05) 30%, transparent 62%);
}
</style>
</head>
<body>

<div class="light-stage"><div class="light-ambient"></div></div>

<div class="content">
  <div class="page-header">
    <h1 class="page-title">用户痛点</h1>
    <p class="page-subtitle">「三个真实的崩溃瞬间，指向同一个未满足的需求」</p>
  </div>

  <div class="quotes-col">
    <div class="quote-block">
      <div class="quote-tag"><span class="tag-tai">太</span>贵</div>
      <div class="quote-body">
        <div class="quote-voice">问了五家中介，最便宜的也要八千…</div>
        <div class="quote-context">传统中介文书<span class="em">收费5,000-20,000元</span>，对普通家庭是不小的负担。低价模板千篇一律，<span class="em">花冤枉钱</span>买不到好文书。</div>
      </div>
    </div>

    <div class="quote-block">
      <div class="quote-tag"><span class="tag-tai">太</span>慢</div>
      <div class="quote-body">
        <div class="quote-voice">文书老师一周才回我一次消息…</div>
        <div class="quote-context">传统服务周期<span class="em">2-4周</span>，来回沟通迭代缓慢。截止日期逼近时焦虑爆表，<span class="em">错过黄金申请窗口</span>的事每年都在重演。</div>
      </div>
    </div>

    <div class="quote-block">
      <div class="quote-tag"><span class="tag-tai">太</span>烂</div>
      <div class="quote-body">
        <div class="quote-voice">ChatGPT写的看起来都对，但就是不像我…</div>
        <div class="quote-context">通用AI输出<span class="em">模板化严重、缺乏个性化</span>，无法精准匹配目标院校风格。<span class="em">千篇一律</span>的文书在招生官眼里就是扣分项。</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-tagline">
  <div class="tagline-line"></div>
  <div class="tagline-text">贵<span class="sep">·</span>慢<span class="sep">·</span>烂 —— 三个痛点，一个解法</div>
</div>

  <!-- Decorative spheres -->
  <div class="deco-sphere deco-bl"></div>
  <div class="deco-sphere deco-tr"></div>
</body>
</html>
