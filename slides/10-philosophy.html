<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>10 · AI产品方法论</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
.light-stage { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.light-top {
  position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
  width: 1200px; height: 500px;
  background: radial-gradient(ellipse 55% 70% at 50% 0%, rgba(185,198,212,0.12) 0%, rgba(185,198,212,0.05) 30%, transparent 60%);
  animation: lightReveal 2.4s var(--ease-soft) forwards; opacity: 0;
}

body { display: flex; align-items: center; justify-content: center; }

/* Editorial layout - centered, large text, lots of whitespace */
.editorial { text-align: center; max-width: 1200px; position: relative; z-index: 1; }

.ed-kicker {
  font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.15em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 32px;
  opacity: 0; animation: textFadeUp 1.2s 0.3s var(--ease-soft) forwards;
}
.ed-title {
  font-family: var(--font-serif); font-size: 64px; font-weight: 500; letter-spacing: 0.03em;
  line-height: 1.2; color: var(--text-primary); margin-bottom: 48px;
  opacity: 0; animation: textFadeUp 1.4s 0.6s var(--ease-soft) forwards;
}
	.ed-sub {
	  font-size: 28px; font-weight: 400; color: var(--text-secondary);
	  display: block; margin-top: 8px;
	}
.ed-divider { width: 60px; height: 1px; background: var(--divider); margin: 0 auto 48px; opacity: 0; animation: textFadeUp 1.2s 1.0s var(--ease-soft) forwards; }

/* Three principles */
.principles { display: flex; gap: 64px; justify-content: center; margin-bottom: 48px; }
.principle {
  flex: 0 0 300px; text-align: left;
  opacity: 0; animation: cardReveal 1.2s var(--ease-soft) forwards;
}
.principle:nth-child(1) { animation-delay: 1.2s; }
.principle:nth-child(2) { animation-delay: 1.45s; }
.principle:nth-child(3) { animation-delay: 1.7s; }

.p-icon { font-family: var(--font-serif); font-size: 28px; color: var(--accent); margin-bottom: 18px; }
.p-label { font-family: var(--font-serif); font-size: 24px; font-weight: 500; letter-spacing: 0.04em; color: var(--text-primary); margin-bottom: 10px; }
.p-desc { font-family: var(--font-sans); font-size: 14px; font-weight: 300; line-height: 1.7; color: var(--text-secondary); }

/* Bottom quote */
.ed-quote {
  font-family: var(--font-serif); font-size: 18px; font-style: italic; font-weight: 400;
  letter-spacing: 0.04em; color: var(--accent-soft); margin-top: 16px;
  opacity: 0; animation: textFadeUp 1.2s 2.1s var(--ease-soft) forwards;
}

/* Diffused ambient light pools */
.deco-sphere { position: fixed; border-radius: 50%; pointer-events: none; z-index: 998; filter: blur(80px); }
/* Bottom-left: warm light */
.deco-bl {
  bottom: -300px; left: -200px; width: 900px; height: 700px;
  background: radial-gradient(ellipse 60% 55% at 45% 40%, rgba(200,190,175,0.18) 0%, rgba(195,185,170,0.06) 35%, transparent 65%);
}
/* Top-right: cool daylight */
.deco-tr {
  top: -250px; right: -150px; width: 800px; height: 600px;
  background: radial-gradient(ellipse 55% 50% at 55% 50%, rgba(175,190,210,0.15) 0%, rgba(180,195,215,0.05) 30%, transparent 62%);
}
/* Center-left: very faint bridging tone */
.deco-mid {
  top: 300px; left: -100px; width: 600px; height: 500px;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(185,188,200,0.08) 0%, rgba(190,192,202,0.03) 40%, transparent 68%);
}
</style>
</head>
<body>

<div class="light-stage"><div class="light-top"></div></div>

<div class="editorial">
  <div class="ed-kicker">What I Believe</div>
  <div class="ed-title">AI产品经理<br><span class="ed-sub">让模型落地场景应用</span></div>
  <div class="ed-divider"></div>

  <div class="principles">
    <div class="principle">
      <div class="p-icon">01</div>
      <div class="p-label">问题定义者</div>
      <div class="p-desc">AI时代，技术不再是瓶颈。PM的核心价值从「执行」上移到「定义」——找到那个<span style="font-weight:500;color:#1A1A1A;">值得用AI解决的问题</span>。</div>
    </div>
    <div class="principle">
      <div class="p-icon">02</div>
      <div class="p-label">数据验证者</div>
      <div class="p-desc">AI工具让MVP的成本降低。PM的工作方式从「想清楚再做」变成<span style="font-weight:500;color:#1A1A1A;">「快速做出来用数据验证」</span>——迭代速度是新的核心竞争力。</div>
    </div>
    <div class="principle">
      <div class="p-icon">03</div>
      <div class="p-label">商业闭环者</div>
      <div class="p-desc">demo和产品之间，隔着<span style="font-weight:500;color:#1A1A1A;">一个可持续的商业模式</span>。AI PM必须从第一天就想清楚：用户为什么付费？壁垒在哪里？增长飞轮怎么转？</div>
    </div>
  </div>

  <div class="ed-quote">「定义问题 × 验证数据 × 闭环商业」</div>
</div>

  <!-- Decorative spheres -->
  <div class="deco-sphere deco-bl"></div>
  <div class="deco-sphere deco-tr"></div>
</body>
</html>
