<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>02 · 市场洞察</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
.light-stage { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.light-ambient {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 1600px; height: 700px;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(185,198,212,0.10) 0%, rgba(185,198,212,0.04) 35%, transparent 65%);
  animation: lightReveal 2.4s var(--ease-soft) forwards; opacity: 0;
}

.page-header { margin-bottom: 64px; }

/* Three stat cards */
.stats-row { display: flex; gap: 60px; margin-bottom: 64px; justify-content: center; }
.stat-card {
  flex: 1; max-width: 460px;
  background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border); border-radius: 16px; padding: 44px;
  box-shadow: var(--shadow-card);
  opacity: 0; animation: cardReveal 1.3s var(--ease-soft) forwards;
}
.stat-card:nth-child(1) { animation-delay: 0.8s; }
.stat-card:nth-child(2) { animation-delay: 1.0s; }
.stat-card:nth-child(3) { animation-delay: 1.2s; }

.stat-number {
  font-family: var(--font-serif); font-size: 72px; font-weight: 500; letter-spacing: 0.02em;
  color: var(--accent); line-height: 1; margin-bottom: 12px;
}
.stat-unit {
  font-family: var(--font-sans); font-size: 20px; font-weight: 300;
  color: var(--text-tertiary); margin-left: 4px;
}
.stat-label {
  font-family: var(--font-sans); font-size: 17px; font-weight: 400; letter-spacing: 0.04em;
  color: var(--text-primary); margin-bottom: 8px;
}
.stat-desc {
  font-family: var(--font-sans); font-size: 14px; font-weight: 300; line-height: 1.7;
  color: var(--text-secondary);
}

/* Insight callout */
.insight-bar {
  display: flex; align-items: center; gap: 24px;
  padding: 32px 44px; border-left: 2px solid var(--accent);
  background: rgba(74,85,104,0.04); border-radius: 0 12px 12px 0;
  opacity: 0; animation: textFadeUp 1.2s 1.6s var(--ease-soft) forwards;
}
.insight-icon { font-family: var(--font-serif); font-size: 24px; color: var(--accent); }
.insight-text { font-family: var(--font-sans); font-size: 17px; font-weight: 400; line-height: 1.7; color: var(--text-primary); letter-spacing: 0.03em; }
.insight-text .em { font-weight: 600; color: var(--accent); }

/* Diffused ambient light pools */
.deco-sphere { position: fixed; border-radius: 50%; pointer-events: none; z-index: 998; filter: blur(80px); }
/* Bottom-left: warm light */
.deco-bl {
  bottom: -300px; left: -200px; width: 900px; height: 700px;
  background: radial-gradient(ellipse 60% 55% at 45% 40%, rgba(200,190,175,0.18) 0%, rgba(195,185,170,0.06) 35%, transparent 65%);
}
/* Top-right: cool daylight */
.deco-tr {
  top: -250px; right: -150px; width: 800px; height: 600px;
  background: radial-gradient(ellipse 55% 50% at 55% 50%, rgba(175,190,210,0.15) 0%, rgba(180,195,215,0.05) 30%, transparent 62%);
}
/* Center-left: very faint bridging tone */
.deco-mid {
  top: 300px; left: -100px; width: 600px; height: 500px;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(185,188,200,0.08) 0%, rgba(190,192,202,0.03) 40%, transparent 68%);
}
</style>
</head>
<body>

<div class="light-stage"><div class="light-ambient"></div></div>

<div class="content">
  <div class="page-header">
    <h1 class="page-title">市场洞察</h1>
    <p class="page-subtitle">「千亿留学赛道，AI替代窗口已经打开」</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number">70<span class="stat-unit">万+</span></div>
      <div class="stat-label">中国年留学人数</div>
      <div class="stat-desc">2025年出国留学人数突破70万，每位申请者平均需要3-5套文书材料</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">¥2<span class="stat-unit">万/人</span></div>
      <div class="stat-label">传统中介平均收费</div>
      <div class="stat-desc">文书收费5000-20000元，且质量参差不齐、服务周期长达2-4周</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">21<span class="stat-unit">%</span></div>
      <div class="stat-label">AI决策使用率</div>
      <div class="stat-desc">仅21%中国学生使用AI辅助留学决策，文书写作环节渗透率更低，专业工具几近空白</div>
    </div>
  </div>

  <div class="insight-bar">
    <span class="insight-icon">✦</span>
    <p class="insight-text">核心洞察：<span class="em">庞大需求 × 高价低效的传统供给 × 近乎空白的AI专业替代</span> = 结构性创业机会</p>
  </div>
</div>

<div class="bottom-tagline">
  <div class="tagline-line"></div>
  <div class="tagline-text">数据来源：教育部留学服务中心 · INTO Global 2025 · 行业公开数据</div>
</div>

  <!-- Decorative spheres -->
  <div class="deco-sphere deco-bl"></div>
  <div class="deco-sphere deco-tr"></div>
</body>
</html>
