<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>07 · 竞争壁垒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
.light-stage { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.light-ambient {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 1500px; height: 700px;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(185,198,212,0.12) 0%, rgba(185,198,212,0.05) 35%, transparent 65%);
  animation: lightReveal 2.4s var(--ease-soft) forwards; opacity: 0;
}

.page-header { margin-bottom: 40px; }

/* Three-column comparison */
.compare-row { display: flex; gap: 60px; flex: 0; align-items: stretch; justify-content: center; }

.compare-col {
  flex: 1; max-width: 480px;
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: 16px; padding: 40px 36px;
  box-shadow: var(--shadow-card);
  opacity: 0; animation: cardReveal 1.2s var(--ease-soft) forwards;
}
.compare-col:nth-child(1) { animation-delay: 0.7s; }
.compare-col:nth-child(2) { animation-delay: 0.9s; }
.compare-col:nth-child(3) { animation-delay: 1.1s; border-color: rgba(74,85,104,0.35); box-shadow: 0 2px 60px rgba(0,0,0,0.04), 0 1px 20px rgba(0,0,0,0.03), 0 0 0 1px rgba(74,85,104,0.08); }

.col-header { text-align: center; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #E8E8E8; }
.col-name { font-family: var(--font-serif); font-size: 24px; font-weight: 500; letter-spacing: 0.04em; color: var(--text-primary); }
.col-name .hl { color: var(--accent); }
.col-sub { font-family: var(--font-sans); font-size: 14px; font-weight: 300; color: var(--text-tertiary); margin-top: 6px; }

.compare-item { padding: 16px 0; border-bottom: 1px solid #F0F0F0; }
.compare-item:last-child { border-bottom: none; }
.ci-label { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.06em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; }
.ci-value { font-family: var(--font-sans); font-size: 14px; font-weight: 400; line-height: 1.6; color: var(--text-primary); }
.ci-value.bad { color: #C09080; }
.ci-value.good { color: var(--accent); }

/* Winner badge */
.winner-badge {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #FAFAFA; font-family: var(--font-sans); font-size: 11px;
  font-weight: 500; letter-spacing: 0.1em; padding: 6px 20px; border-radius: 999px;
}

/* Diffused ambient light pools */
.deco-sphere { position: fixed; border-radius: 50%; pointer-events: none; z-index: 998; filter: blur(80px); }
/* Bottom-left: warm light */
.deco-bl {
  bottom: -300px; left: -200px; width: 900px; height: 700px;
  background: radial-gradient(ellipse 60% 55% at 45% 40%, rgba(200,190,175,0.18) 0%, rgba(195,185,170,0.06) 35%, transparent 65%);
}
/* Top-right: cool daylight */
.deco-tr {
  top: -250px; right: -150px; width: 800px; height: 600px;
  background: radial-gradient(ellipse 55% 50% at 55% 50%, rgba(175,190,210,0.15) 0%, rgba(180,195,215,0.05) 30%, transparent 62%);
}
/* Center-left: very faint bridging tone */
.deco-mid {
  top: 300px; left: -100px; width: 600px; height: 500px;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(185,188,200,0.08) 0%, rgba(190,192,202,0.03) 40%, transparent 68%);
}
</style>
</head>
<body>

<div class="light-stage"><div class="light-ambient"></div></div>

<div class="content">
  <div class="page-header">
    <h1 class="page-title">竞品对比</h1>
    <p class="page-subtitle">「传统中介和通用AI，为什么都做不好留学文书？」</p>
  </div>

  <div class="compare-row">
    <!-- Column 1: Traditional -->
    <div class="compare-col">
      <div class="col-header">
        <div class="col-name">传统中介</div>
        <div class="col-sub">高客单价 · 人工服务</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">成本</div>
        <div class="ci-value bad">¥5,000-20,000 / 人</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">时效</div>
        <div class="ci-value bad">2-4 周</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">质量</div>
        <div class="ci-value bad">因人而异，质量不稳定</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">规模化</div>
        <div class="ci-value bad">受限于人力，难以扩展</div>
      </div>
    </div>

    <!-- Column 2: Generic AI -->
    <div class="compare-col">
      <div class="col-header">
        <div class="col-name">通用AI</div>
        <div class="col-sub">低成本 · 模板化</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">成本</div>
        <div class="ci-value good">近乎为零</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">时效</div>
        <div class="ci-value good">1-2 分钟</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">质量</div>
        <div class="ci-value bad">千篇一律 · 缺乏个性化</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">规模化</div>
        <div class="ci-value bad">无垂直领域知识</div>
      </div>
    </div>

    <!-- Column 3: EssayAI (winner) -->
    <div class="compare-col">
      <div class="winner-badge">✦ 我们的方案</div>
      <div class="col-header">
        <div class="col-name"><span class="hl">EssayAI</span></div>
        <div class="col-sub">免费 · 专业 · 智能</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">成本</div>
        <div class="ci-value good">基础免费 · 高级会员</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">时效</div>
        <div class="ci-value good">3 分钟 · 实时生成</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">质量</div>
        <div class="ci-value good">1500+真实文书库 · 风格匹配</div>
      </div>
      <div class="compare-item">
        <div class="ci-label">规模化</div>
        <div class="ci-value good">AI驱动 · 零边际成本</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-tagline">
  <div class="tagline-line"></div>
  <div class="tagline-text">成本<span class="sep">·</span>效率<span class="sep">·</span>专业度 —— 三维优势</div>
</div>

  <!-- Decorative spheres -->
  <div class="deco-sphere deco-bl"></div>
  <div class="deco-sphere deco-tr"></div>
</body>
</html>
