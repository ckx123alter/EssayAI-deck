<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>04 · 产品方案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
.light-stage { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.light-ambient {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 1600px; height: 800px;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(185,198,212,0.10) 0%, rgba(185,198,212,0.04) 35%, transparent 65%);
  animation: lightReveal 2.4s var(--ease-soft) forwards; opacity: 0;
}

.page-header { margin-bottom: 64px; }

/* ——— Stacked Layers Layout ——— */
.layers-col {
  display: flex; flex-direction: column; align-items: center; gap: 0;
  flex: 0; padding: 0 80px;
}

.layer {
  display: flex; align-items: center; gap: 48px;
  padding: 36px 52px;
  border-radius: 14px;
  background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-card);
  opacity: 0; animation: cardReveal 1.1s var(--ease-soft) forwards;
  position: relative;
}
/* Widths: foundation widest → top narrowest */
.layer-1 { width: 100%;  max-width: 1120px; animation-delay: 0.8s; z-index: 1; margin-top: 12px; }
.layer-2 { width: 88%;   max-width: 986px;  animation-delay: 1.1s; z-index: 2; margin-top: 12px; }
.layer-3 { width: 76%;   max-width: 852px;  animation-delay: 1.4s; z-index: 3; margin-top: 12px; border-color: rgba(74,85,104,0.30); }

.layer-num {
  flex: 0 0 56px; height: 56px; border-radius: 50%;
  background: rgba(74,85,104,0.08);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 20px; font-weight: 500; color: var(--accent);
}
.layer-body { flex: 1; }
.layer-title {
  font-family: var(--font-serif); font-size: 26px; font-weight: 500;
  letter-spacing: 0.03em; color: var(--text-primary); margin-bottom: 8px;
}
.layer-title .hl { color: var(--accent); }
.layer-desc {
  font-family: var(--font-sans); font-size: 14px; font-weight: 300;
  line-height: 1.7; color: var(--text-secondary);
  max-width: 680px;
}
.layer-desc .em { font-weight: 500; color: var(--text-primary); }

/* Foundation label */
.layer-footnote {
  margin-top: 20px;
  font-family: var(--font-sans); font-size: 12px; font-weight: 400;
  letter-spacing: 0.06em; color: var(--text-tertiary);
  opacity: 0; animation: textFadeUp 1.0s 0.5s var(--ease-soft) forwards;
}

/* Diffused ambient light pools */
.deco-sphere { position: fixed; border-radius: 50%; pointer-events: none; z-index: 998; filter: blur(80px); }
.deco-bl {
  bottom: -300px; left: -200px; width: 900px; height: 700px;
  background: radial-gradient(ellipse 60% 55% at 45% 40%, rgba(200,190,175,0.18) 0%, rgba(195,185,170,0.06) 35%, transparent 65%);
}
.deco-tr {
  top: -250px; right: -150px; width: 800px; height: 600px;
  background: radial-gradient(ellipse 55% 50% at 55% 50%, rgba(175,190,210,0.15) 0%, rgba(180,195,215,0.05) 30%, transparent 62%);
}
</style>
</head>
<body>

<div class="light-stage"><div class="light-ambient"></div></div>

<div class="content">
  <div class="page-header">
    <h1 class="page-title">产品方案</h1>
    <p class="page-subtitle">「不是ChatGPT套壳，而是三重壁垒的深度系统」</p>
  </div>

  <div class="layers-col">
    <!-- Top: Experience (narrowest) -->
    <div class="layer layer-3">
      <div class="layer-num">03</div>
      <div class="layer-body">
        <div class="layer-title">体验<span class="hl">壁垒</span></div>
        <div class="layer-desc">
          <span class="em">3分钟完成初稿</span>，专业排版开箱即用。支持多端实时同步，手机电脑无缝切换，进度永不丢失。一键导出为<span class="em">Word/PDF</span>——从创作到交付，零摩擦体验。
        </div>
      </div>
    </div>

    <!-- Middle: Tech -->
    <div class="layer layer-2">
      <div class="layer-num">02</div>
      <div class="layer-body">
        <div class="layer-title">技术<span class="hl">壁垒</span></div>
        <div class="layer-desc">
          <span class="em">多智能体协作架构</span>，不同文书所需信息各异，分别由<span class="em">结构化表单引导填写</span>，结构化生成管线确保<span class="em">逻辑一致性与互补性</span>——每一份文书都相互呼应。
        </div>
      </div>
    </div>

    <!-- Foundation: Data (widest) -->
    <div class="layer layer-1">
      <div class="layer-num">01</div>
      <div class="layer-body">
        <div class="layer-title">数据<span class="hl">壁垒</span></div>
        <div class="layer-desc">
          <span class="em">1500+篇真实录取文书</span>构成的专有知识库，覆盖热门留学地区各专业。增强检索实现<span class="em">风格精准匹配</span>——不止是内容生成，更是风格迁移。
        </div>
      </div>
    </div>

    <div class="layer-footnote">▲ 三层壁垒，一层托举一层</div>
  </div>
</div>

<div class="bottom-tagline">
  <div class="tagline-line"></div>
  <div class="tagline-text">RAG检索增强<span class="sep">·</span>结构化生成<span class="sep">·</span>多端实时同步</div>
</div>

  <!-- Decorative spheres -->
  <div class="deco-sphere deco-bl"></div>
  <div class="deco-sphere deco-tr"></div>
</body>
</html>
